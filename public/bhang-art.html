// в”Ђв”Ђв”Ђ TX STRIP-PACK (series 1 mined only) в”Ђв”Ђв”Ђ
function drawTxBlock(cx,cy,radius,data,seed){
  var rng=m32(seed);var txs=[];
  for(var i=0;i<data.length;i++)txs.push({vsize:data[i][0],fee:data[i][1]});
  var gp=0.8;var side=radius*Math.SQRT2;var hs=side/2;
  var ox=cx-hs,oy=cy-hs;
  var totalVsize=0;for(var i=0;i<txs.length;i++)totalVsize+=txs[i].vsize;
  var pxPerVs=(side*side)/totalVsize;var curY=oy,idx=0;
  while(idx<txs.length&&curY<oy+side-0.5){
    var rowTxs=[],rowVsize=0;
    var firstArea=txs[idx].vsize*pxPerVs;var targetH=max(2,sqrt(firstArea));
    targetH=min(targetH,oy+side-curY);var rowWidth=0;
    while(idx<txs.length&&rowWidth<side-0.5){
      var tx=txs[idx];var txArea=tx.vsize*pxPerVs;var txW=txArea/targetH;
      if(rowWidth+txW>side*1.05&&rowTxs.length>0)break;
      rowTxs.push({vsize:tx.vsize,fee:tx.fee,w:txW});rowVsize+=tx.vsize;rowWidth+=txW;idx++;
    }
    if(!rowTxs.length){curY+=1;continue;}
    var rowArea=rowVsize*pxPerVs;var rowH=min(rowArea/side,oy+side-curY);
    var wScale=side/rowWidth;var curX=ox;
    for(var j=0;j<rowTxs.length;j++){
      var rt=rowTxs[j];var w=rt.w*wScale;var dw=w-gp,dh=rowH-gp;
      if(dw>0.5&&dh>0.5){var fc=feeColor(rt.fee,rng);fill(fc[0],fc[1],fc[2]);noStroke();rect(curX+gp/2,curY+gp/2,dw,dh);}
      curX+=w;
    }
    curY+=rowH;
  }
}

// в”Ђв”Ђв”Ђ MATRIX RAIN вЂ” falling binary digits в”Ђв”Ђв”Ђ
// Generate column layout from block number (deterministic)
function generateMatrix(blockNum,radius){
  if(matrixCache[blockNum])return matrixCache[blockNum];
  var rng=m32(blockNum);
  var cols=[];
  var fontSize=max(6,floor(radius*0.038));
  var nCols=floor(radius*2/fontSize);
  var ox=-radius;
  for(var i=0;i<nCols;i++){
    var x=ox+i*fontSize+fontSize*0.5;
    var maxY=sqrt(max(0,radius*radius-x*x));
    if(maxY<fontSize*2)continue;
    cols.push({
      x:x,
      yMin:-maxY,
      yMax:maxY,
      speed:0.3+rng()*1.0,
      offset:rng()*300,
      chars:[],
      bright:0.5+rng()*0.5
    });
    var nChars=ceil(maxY*2/fontSize)+10;
    var charArr=[];
    for(var j=0;j<nChars;j++){
      charArr.push(rng()>0.5?'1':'0');
    }
    cols[cols.length-1].chars=charArr;
  }
  matrixCache[blockNum]=cols;
  return cols;
}

// Draw matrix rain inside a lens
function drawMatrix(cx,cy,radius,blockNum,time,ghost,th){
  var cols=generateMatrix(blockNum,radius);
  var fontSize=max(8,floor(radius*0.06));
  var ctx=drawingContext;
  var gc=ghost?th.wire:th.glow;

  ctx.save();
  ctx.font=fontSize+'px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  var tailLen=12;

  for(var i=0;i<cols.length;i++){
    var col=cols[i];
    var colHeight=col.yMax-col.yMin;
    var nVisible=ceil(colHeight/fontSize);
    var scrollSpeed=fontSize*col.speed*0.7;
    var scroll=(time+col.offset)*scrollSpeed;
    var headIdx=floor(scroll/fontSize);

    for(var j=-2;j<nVisible+3;j++){
      var charIdx=headIdx-j;
      var yPos=col.yMin+j*fontSize-(scroll%fontSize);
      var screenY=cy+yPos;
      var screenX=cx+col.x;

      var dx=col.x,dy=yPos;
      if(dx*dx+dy*dy>radius*radius*0.94)continue;

      var distFromHead=j;
      var ch=col.chars[((charIdx%col.chars.length)+col.chars.length)%col.chars.length];

      if(sin(time*3+i*7+j*13)>0.96)ch=ch==='1'?'0':'1';

      if(distFromHead<=0){
        var headAlpha=max(0,1.0+distFromHead*0.4);
        ctx.shadowColor='rgb('+gc[0]+','+gc[1]+','+gc[2]+')';
        ctx.shadowBlur=fontSize;
        ctx.fillStyle='rgba(255,255,255,'+headAlpha*0.95+')';
        ctx.fillText(ch,screenX,screenY);
        ctx.shadowBlur=0;
      }else if(distFromHead<tailLen){
        var tailAlpha=map(distFromHead,0,tailLen,0.95,0.10);
        var bright=map(distFromHead,0,tailLen,1.0,0.45);
        ctx.fillStyle='rgba('+floor(gc[0]*bright)+','+floor(gc[1]*bright)+','+floor(gc[2]*bright)+','+tailAlpha+')';
        ctx.fillText(ch,screenX,screenY);
      }else{
        // Persistent dim trail вЂ” fills the lens with faint digits
        var trailAlpha=max(0,0.18-distFromHead*0.0015)*(ghost?0.7:1.0)*col.bright;
        if(trailAlpha>0.008){
          ctx.fillStyle='rgba('+floor(gc[0]*0.25)+','+floor(gc[1]*0.25)+','+floor(gc[2]*0.25)+','+trailAlpha+')';
          ctx.fillText(ch,screenX,screenY);
        }
      }
    }
  }
  ctx.restore();
}

function leafletEnv(t){
  if(t<0.04)return map(t,0,0.04,0.05,0.35);if(t<0.15)return map(t,0.04,0.15,0.35,0.80);
  if(t<0.35)return map(t,0.15,0.35,0.80,1.0);if(t<0.50)return map(t,0.35,0.50,1.0,0.92);
  if(t<0.62)return map(t,0.50,0.62,0.92,0.78);if(t<0.75)return map(t,0.62,0.75,0.78,0.50);
  if(t<0.88)return map(t,0.75,0.88,0.50,0.18);return map(t,0.88,1.0,0.18,0);
}
function midribBend(t,hw,dir){var d=dir||1;return hw*sin(t*PI)*(d<0?0.7:0.4)*(1-t*0.5)*d;}
function serrationDepth(t){if(t<0.12)return 0;if(t<0.30)return map(t,0.12,0.30,0,0.6);if(t<0.55)return map(t,0.30,0.55,0.6,1.0);if(t<0.80)return map(t,0.55,0.80,1.0,0.5);if(t<0.92)return map(t,0.80,0.92,0.5,0.15);return 0;}
function leafletSerration(t,w,hw,tps){var sd=serrationDepth(t);if(sd<0.01||w<0.1)return 0;var ph=(t*tps)%1;var depth=hw*0.30*w*sd;if(ph<0.65)return map(ph,0,0.65,0,depth);return map(ph,0.65,1.0,depth,-depth*0.1);}
function addLeafletPath(ctx,ox,oy,hw,len,ang,bd){var n=120;var tps=max(8,round(len/(hw*0.8)));ctx.save();ctx.translate(ox,oy);ctx.rotate(ang);ctx.moveTo(0,0);for(var i=1;i<=n;i++){var t=i/n;var w=leafletEnv(t);var bx=midribBend(t,hw,bd);ctx.lineTo(bx+hw*w+leafletSerration(t,w,hw,tps),-len*t);}for(var i=n;i>=0;i--){var t=i/n;var w=leafletEnv(t);var bx=midribBend(t,hw,bd);ctx.lineTo(bx-(hw*w+leafletSerration(t,w,hw,tps)),-len*t);}ctx.closePath();ctx.restore();}

  if(ga>0){var lw=max(1.5,s*0.008);ctx.save();ctx.beginPath();for(var i=0;i<fingers.length;i++){var f=fingers[i];addLeafletPath(ctx,0,f[0],f[1],f[2],f[3],i===8?-1:1);}ctx.lineWidth=lw;ctx.strokeStyle='rgba('+gc[0]+','+gc[1]+','+gc[2]+','+(ga/255)+')';ctx.lineJoin='round';ctx.stroke();ctx.restore();stroke(gc[0],gc[1],gc[2],ga);strokeWeight(lw);noFill();beginShape();for(var i=0;i<=20;i++){var t=i/20;vertex(sin(t*PI)*L*0.015,t*L*0.25);}endShape();}
  noFill();stroke(sd[0],sd[1],sd[2]);strokeWeight(s*0.02);beginShape();for(var i=0;i<=20;i++){var t=i/20;vertex(sin(t*PI)*L*0.015,t*L*0.25);}endShape();
  stroke(sl[0],sl[1],sl[2]);strokeWeight(s*0.008);beginShape();for(var i=0;i<=20;i++){var t=i/20;vertex(sin(t*PI)*L*0.015,t*L*0.24);}endShape();
  for(var fi2=0;fi2<order.length;fi2++){
    var fi=order[fi2];var f=fingers[fi];var oy2=f[0],hw=f[1],len=f[2],ang=f[3];var bd=fi===8?-1:1;
    var dkR=fi===0?1.0:(fi<3?0.92:(fi<7?0.82:0.75));
    var dk='rgb('+floor(ld[0]*dkR)+','+floor(ld[1]*dkR)+','+floor(ld[2]*dkR)+')';
    var lt='rgb('+floor(ll[0]*dkR)+','+floor(ll[1]*dkR)+','+floor(ll[2]*dkR)+')';
    ctx.save();ctx.beginPath();addLeafletPath(ctx,0,oy2,hw,len,ang,bd);ctx.fillStyle=dk;ctx.fill();ctx.strokeStyle='rgba('+floor(ld[0]*0.4)+','+floor(ld[1]*0.4)+','+floor(ld[2]*0.4)+',0.5)';ctx.lineWidth=max(0.8,s*0.003);ctx.lineJoin='round';ctx.stroke();ctx.restore();
    ctx.save();ctx.translate(0,oy2);ctx.rotate(ang);ctx.beginPath();var nc=40;ctx.moveTo(0,0);for(var i=0;i<=nc;i++){var t=i/nc;var bx=midribBend(t,hw,bd);ctx.lineTo(bx+hw*leafletEnv(t)*0.35,-len*t);}for(var i=nc;i>=0;i--){var t=i/nc;var bx=midribBend(t,hw,bd);ctx.lineTo(bx-hw*leafletEnv(t)*0.35,-len*t);}ctx.closePath();ctx.fillStyle=lt;ctx.fill();ctx.restore();
    push();translate(0,oy2);rotate(ang);var tn=max(4,round(len/(hw*1.2)));stroke(vc[0],vc[1],vc[2],120);strokeWeight(max(0.5,hw*0.04));noFill();for(var v=0;v<tn;v++){var t=0.12+(v/tn)*0.72;var y=-len*t;var bx2=midribBend(t,hw,bd);var ew=leafletEnv(t);var reach=hw*ew*0.85;var tipY=y-reach*0.35;var mx=reach*0.5,my=y-reach*0.12;line(bx2,y,bx2+mx,my);line(bx2+mx,my,bx2+reach,tipY);line(bx2,y,bx2-mx,my);line(bx2-mx,my,bx2-reach,tipY);}pop();
    push();translate(0,oy2);rotate(ang);noFill();stroke(sd[0],sd[1],sd[2]);strokeWeight(max(1.5,hw*0.16));beginShape();for(var i=0;i<=30;i++){var t=i/30*0.94;vertex(midribBend(t,hw,bd),-len*t);}endShape();stroke(sl[0],sl[1],sl[2]);strokeWeight(max(0.8,hw*0.07));beginShape();for(var i=0;i<=30;i++){var t=0.02+i/30*0.90;vertex(midribBend(t,hw,bd),-len*t);}endShape();pop();

// в”Ђв”Ђв”Ђ FRAME / GLOW / FIRE в”Ђв”Ђв”Ђ
function drawFrame(lx,ly,rx,ry,rad,thick,th){push();var bL=lx+rad,bR=rx-rad,mX=(lx+rx)/2,mY=ly-rad*0.15,bw=thick*1.1;var layers=[[th.fd,bw],[th.fm,bw*0.75],[th.fh,bw*0.3]];for(var i=0;i<layers.length;i++){var c=layers[i][0],w=layers[i][1];stroke(c[0],c[1],c[2]);strokeWeight(w);strokeCap(ROUND);noFill();beginShape();vertex(bL,ly);quadraticVertex(bL+(mX-bL)*0.4,mY,mX,mY);endShape();beginShape();vertex(bR,ry);quadraticVertex(bR-(bR-mX)*0.4,mY,mX,mY);endShape();}noFill();stroke(th.fd[0],th.fd[1],th.fd[2]);strokeWeight(thick);ellipse(lx,ly,rad*2,rad*2);ellipse(rx,ry,rad*2,rad*2);stroke(th.fm[0],th.fm[1],th.fm[2]);strokeWeight(thick*0.7);ellipse(lx,ly,rad*2,rad*2);ellipse(rx,ry,rad*2,rad*2);stroke(th.fh[0],th.fh[1],th.fh[2]);strokeWeight(thick*0.25);ellipse(lx,ly,rad*2-thick*0.5,rad*2-thick*0.5);ellipse(rx,ry,rad*2-thick*0.5,rad*2-thick*0.5);pop();}

function drawGlowFrame(lx,ly,rx,ry,rad,thick,time,th){push();var gi=(sin(time*2)+1)*0.5,gs=thick*0.6*gi,gc=th.glow;for(var i=3;i>=0;i--){var a=(30+gi*40)*(1-i*0.25);stroke(gc[0],gc[1],gc[2],a);strokeWeight(thick+gs+i*thick*0.4);noFill();ellipse(lx,ly,rad*2,rad*2);ellipse(rx,ry,rad*2,rad*2);}var sa=time*0.8;for(var lens=0;lens<2;lens++){var cx2=lens===0?lx:rx;noFill();for(var g=0;g<3;g++){var a2=map(g,0,3,180,40);stroke(gc[0],gc[1],gc[2],a2*gi*0.5+a2*0.5);strokeWeight(thick*(1.2-g*0.25));arc(cx2,ly,rad*2,rad*2,sa-0.4,sa+0.4);}}pop();}

function drawFireEffect(lx,ly,rx,ry,rad,thick,time,fc){push();noStroke();for(var lens=0;lens<2;lens++){var cx2=lens===0?lx:rx;for(var i=0;i<30;i++){var ba=(i/30)*TWO_PI;var bx=cx2+cos(ba)*rad,by=ly+sin(ba)*rad;var dx=cos(ba),dy=sin(ba),px=-dy,py=dx;var fl=sin(time*6+i*2.5)*0.35+sin(time*9.3+i*1.7)*0.2+0.65;var h=thick*(1.8+fl*3.0),w=thick*0.55,sw=sin(time*4.2+i*1.3)*thick*0.3;for(var layer=0;layer<3;layer++){var ls=1-layer*0.28;var al=[35,75,145][layer];var br=layer*40;fill(min(255,fc[0]+br),min(255,fc[1]+br),min(255,fc[2]+br),al*fl);var fh=h*ls,fw=w*ls;var tx=bx+dx*fh+px*sw*ls,ty=by+dy*fh+py*sw*ls;triangle(bx-px*fw,by-py*fw,bx+px*fw,by+py*fw,tx,ty);}}for(var i=0;i<15;i++){var age=(time*0.55+i*0.47)%2.8;if(age<2.0){var ba2=(i/15)*TWO_PI+time*0.12;var dist=rad+age*thick*2.8;var ex=cx2+cos(ba2)*dist,ey=ly+sin(ba2)*dist-age*thick*2;fill(min(255,fc[0]+60),min(255,fc[1]+40),min(255,fc[2]+20),map(age,0,2.0,230,0));ellipse(ex+sin(time*2.5+i*3.2)*5,ey,1.2+sin(time*3.5+i*2.1)*1.3,1.2+sin(time*3.5+i*2.1)*1.3);}}}pop();}

function drawBridgeText(lx,rx,cy,rad,sz){push();var mX=(lx+rx)/2,bL=lx+rad,bR=rx-rad,mY=cy-rad*0.15;fill(0);noStroke();textAlign(CENTER,CENTER);textSize(sz*0.018);textStyle(BOLD);var spanX=bR-bL,ls=0.12,tw=4*ls,sf=0.5-tw/2;var word='BHANG';for(var i=0;i<5;i++){var f=sf+i*ls,x=bL+spanX*f,t2=(f-0.5)*2,y=mY+(cy-mY)*t2*t2;push();translate(x,y);rotate(atan(2*(cy-mY)*t2/(spanX*0.5)));text(word[i],0,0);pop();}pop();}

// в”Ђв”Ђв”Ђ CROWN (series 7 only вЂ” above bridge) в”Ђв”Ђв”Ђ
// 5-prong crown: wide triangular prongs fanning out, large oval tips, deep V-valleys
function drawCrown(lx,rx,cy,rad,sz,time,th,thick){
  var bL=lx+rad,bR=rx-rad,mX=(lx+rx)/2,mY=cy-rad*0.15;
  var spanX=bR-bL;
  function bridgeY(f){var t2=(f-0.5)*2;return mY+(cy-mY)*t2*t2;}
  function bridgeX(f){return bL+spanX*f;}

  var gc=th.glow;
  var ctx=drawingContext;
  var pulse=map(sin(time*2),-1,1,0.5,1.0);

  var cw=spanX*0.72;
  var ch=sz*0.032;
  var hw=cw/2;
  var liftY=sz*0.038;
  var bandH=ch*0.18;
  var nSeg=24;

  // 5 prongs: positions, heights, and fan-out angles
  // Outer prongs tilt outward, center is straight up
  var pf=[0.10,0.30,0.50,0.70,0.90];
  var ph=[0.52,0.75,1.0,0.75,0.52];
  // Fan-out: how much the tip shifts outward from base (in hw units)
  var fan=[-0.08,-0.03,0,0.03,0.08];
  // Wide triangle base half-width, narrow tip half-width
  var triBase=hw*0.10;
  var triTip=hw*0.015;
  // Oval tip sizes (center bigger)
  var ovalBase=hw*0.055;
  var ovalH=ch*0.12;

  // в”Ђв”Ђ Subtle glow в”Ђв”Ђ
  ctx.save();
  var grd=ctx.createRadialGradient(mX,mY-liftY-ch*0.3,0,mX,mY-liftY-ch*0.3,cw*0.6);
  grd.addColorStop(0,'rgba('+gc[0]+','+gc[1]+','+gc[2]+','+(0.08*pulse)+')');
  grd.addColorStop(1,'rgba('+gc[0]+','+gc[1]+','+gc[2]+',0)');
  ctx.fillStyle=grd;
  ctx.fillRect(mX-cw,mY-liftY-ch*1.5,cw*2,ch*3);
  ctx.restore();

  // в”Ђв”Ђ Crown body: wide triangular prongs with deep V-valleys в”Ђв”Ђ
  ctx.save();
  ctx.beginPath();

  // Bottom edge вЂ” curved band bottom, right to left
  for(var i=nSeg;i>=0;i--){
    var f=pf[0]+(pf[4]-pf[0])*(i/nSeg);
    var bx=bridgeX(f), by=bridgeY(f)-liftY+bandH;
    if(i===nSeg)ctx.moveTo(bx,by);else ctx.lineTo(bx,by);
  }

  // Top edge вЂ” left to right: wide prongs with deep valleys
  for(var i=0;i<5;i++){
    var fx=pf[i];
    var bx=bridgeX(fx);
    var by=bridgeY(fx)-liftY;
    var tipY=by-ch*ph[i]*0.72;
    var tipX=bx+fan[i]*cw; // fanned tip position

    if(i===0){
      // First prong: start from left edge of band
      ctx.lineTo(bx-triBase*0.5, by);
    }else{
      // Deep V-valley from previous prong down to band level
      var prevF=pf[i-1];
      var midF=(prevF+fx)*0.5;
      var valleyX=bridgeX(midF);
      var valleyY=bridgeY(midF)-liftY+bandH*0.3; // valley goes almost to band
      ctx.lineTo(valleyX, valleyY);
      // Rise to this prong's left base
      ctx.lineTo(bx-triBase, by-ch*0.05);
    }

    // Wide triangle up to tip (left edge)
    ctx.lineTo(tipX-triTip, tipY);
    // Across the tip (narrow)
    ctx.lineTo(tipX+triTip, tipY);
    // Wide triangle back down (right edge)
    if(i<4){
      ctx.lineTo(bx+triBase, by-ch*0.05);
    }else{
      ctx.lineTo(bx+triBase*0.5, by);
    }
  }

  // Close along right edge
  var lastBx=bridgeX(pf[4]);
  var lastBy=bridgeY(pf[4])-liftY;
  ctx.lineTo(lastBx+triBase*0.5, lastBy+bandH);

  ctx.closePath();

  // Gold gradient
  var bodyGrd=ctx.createLinearGradient(0,mY-liftY-ch,0,mY-liftY+bandH);
  bodyGrd.addColorStop(0,'#E8C84A');
  bodyGrd.addColorStop(0.3,'#D4AF37');
  bodyGrd.addColorStop(0.65,'#B8962E');
  bodyGrd.addColorStop(1,'#8B6914');
  ctx.fillStyle=bodyGrd;
  ctx.fill();
  ctx.strokeStyle='rgba(232,210,120,0.4)';
  ctx.lineWidth=max(0.4,sz*0.0007);
  ctx.stroke();
  ctx.restore();

  // в”Ђв”Ђ Large oval tips on each prong в”Ђв”Ђ
  for(var i=0;i<5;i++){
    var bx=bridgeX(pf[i]);
    var by=bridgeY(pf[i])-liftY;
    var tipY=by-ch*ph[i]*0.72;
    var tipX=bx+fan[i]*cw;
    var sc=0.8+ph[i]*0.2; // center oval bigger
    var orx=ovalBase*sc;
    var ory=ovalH*sc;
    // Tilt angle for outer prongs
    var tiltA=fan[i]*1.5;

    ctx.save();
    ctx.translate(tipX, tipY-ory*0.4);
    ctx.rotate(tiltA);
    ctx.beginPath();
    ctx.ellipse(0,0,orx,ory,0,0,Math.PI*2);
    var tg=ctx.createLinearGradient(0,-ory,0,ory);
    tg.addColorStop(0,'#EDD566');
    tg.addColorStop(0.4,'#D4AF37');
    tg.addColorStop(1,'#A07D1C');
    ctx.fillStyle=tg;
    ctx.fill();
    ctx.strokeStyle='rgba(180,150,50,0.3)';
    ctx.lineWidth=max(0.3,sz*0.0005);
    ctx.stroke();
    // Highlight
    ctx.beginPath();
    ctx.ellipse(-orx*0.2,-ory*0.2,orx*0.35,ory*0.3,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,245,200,'+(0.2*pulse)+')';
    ctx.fill();
    ctx.restore();
  }

  // в”Ђв”Ђ Diamond cutouts in the valleys в”Ђв”Ђ
  for(var i=0;i<4;i++){
    var midF=(pf[i]+pf[i+1])*0.5;
    var mx=bridgeX(midF);
    var my=bridgeY(midF)-liftY-ch*0.05;
    var dw=hw*0.04;
    var dh=ch*0.13;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(mx, my-dh);
    ctx.lineTo(mx+dw, my);
    ctx.lineTo(mx, my+dh*0.7);
    ctx.lineTo(mx-dw, my);
    ctx.closePath();
    ctx.fillStyle='#5a4410';
    ctx.fill();
    // Inner diamond highlight
    ctx.beginPath();
    ctx.moveTo(mx, my-dh*0.6);
    ctx.lineTo(mx+dw*0.5, my);
    ctx.lineTo(mx, my+dh*0.4);
    ctx.lineTo(mx-dw*0.5, my);
    ctx.closePath();
    ctx.fillStyle='rgba(212,175,55,0.2)';
    ctx.fill();
    ctx.restore();
  }

  // в”Ђв”Ђ Curved band highlight line в”Ђв”Ђ
  ctx.save();
  ctx.beginPath();
  for(var i=0;i<=nSeg;i++){
    var f=pf[0]+(pf[4]-pf[0])*(i/nSeg);
    var bx=bridgeX(f), by=bridgeY(f)-liftY+0.8;
    if(i===0)ctx.moveTo(bx,by);else ctx.lineTo(bx,by);
  }
  ctx.strokeStyle='rgba(240,225,150,0.25)';
  ctx.lineWidth=max(0.4,sz*0.0006);
  ctx.stroke();
  ctx.restore();
}

// в”Ђв”Ђв”Ђ LENS CROWN (series 7 вЂ” above each circular frame) в”Ђв”Ђв”Ђ
// Base follows circle arc over a quarter sector, same gap as bridge crown
function drawLensCrown(lcx,lcy,rad,sz,time,th){
  var gc=th.glow;
  var ctx=drawingContext;
  var pulse=map(sin(time*2),-1,1,0.5,1.0);
  var liftY=sz*0.038; // same gap as bridge crown
  var outerR=rad+liftY; // crown base sits this far from center

  // Quarter sector: 45deg each side of top = 90deg arc
  var arcStart=-Math.PI*0.75; // -135deg (top-left)
  var arcEnd=-Math.PI*0.25;   // -45deg (top-right)

  // Crown dimensions
  var ch=sz*0.038;
  var bandH=ch*0.16;

  // 5 prongs evenly spaced along the arc
  var nP=5;
  var ph=[1.75,2.5,4.0,2.5,1.75];
  var triBase=0.035; // base width in radians
  var triTip=0.005;  // tip width in radians
  var ovalR=sz*0.006;
  var ovalH=sz*0.005;
  var nSeg=20;

  // Helper: point on circle at angle a, distance r from center
  function cp(a,r){return[lcx+Math.cos(a)*r, lcy+Math.sin(a)*r];}

  // в”Ђв”Ђ Subtle glow в”Ђв”Ђ
  ctx.save();
  var topPt=cp(-Math.PI/2, outerR+ch*0.5);
  var grd=ctx.createRadialGradient(topPt[0],topPt[1],0,topPt[0],topPt[1],ch*2);
  grd.addColorStop(0,'rgba('+gc[0]+','+gc[1]+','+gc[2]+','+(0.06*pulse)+')');
  grd.addColorStop(1,'rgba('+gc[0]+','+gc[1]+','+gc[2]+',0)');
  ctx.fillStyle=grd;
  ctx.beginPath();
  ctx.arc(topPt[0],topPt[1],ch*2,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // в”Ђв”Ђ Crown body в”Ђв”Ђ
  ctx.save();
  ctx.beginPath();

  // Bottom edge: arc along outerR + bandH (inner = closer to lens)
  var bandR=outerR;
  var bandOutR=outerR+bandH;
  // Trace band bottom arc (right to left = clockwise since y is flipped)
  for(var i=nSeg;i>=0;i--){
    var a=arcStart+(arcEnd-arcStart)*(i/nSeg);
    var p=cp(a, bandR);
    if(i===nSeg)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);
  }

  // Top edge: left to right with prongs rising outward
  for(var i=0;i<nP;i++){
    var t=i/(nP-1); // 0 to 1
    var aCenter=arcStart+(arcEnd-arcStart)*t;
    var prongH=ch*ph[i]*0.72;
    var tipR=bandOutR+prongH;

    if(i===0){
      // Start from left edge
      var p=cp(aCenter-triBase*0.3, bandOutR);
      ctx.lineTo(p[0],p[1]);
    }else{
      // Deep V-valley between prongs
      var prevT=(i-1)/(nP-1);
      var prevA=arcStart+(arcEnd-arcStart)*prevT;
      var midA=(prevA+aCenter)*0.5;
      var valleyP=cp(midA, bandR+bandH*0.3);
      ctx.lineTo(valleyP[0],valleyP[1]);
      // Rise to prong base
      var baseP=cp(aCenter-triBase, bandOutR);
      ctx.lineTo(baseP[0],baseP[1]);
    }

    // Left edge of prong up to tip
    var tipL=cp(aCenter-triTip, tipR);
    ctx.lineTo(tipL[0],tipL[1]);
    // Right edge of tip
    var tipRt=cp(aCenter+triTip, tipR);
    ctx.lineTo(tipRt[0],tipRt[1]);
    // Right edge of prong down to base
    if(i<nP-1){
      var baseR2=cp(aCenter+triBase, bandOutR);
      ctx.lineTo(baseR2[0],baseR2[1]);
    }else{
      var p=cp(aCenter+triBase*0.3, bandOutR);
      ctx.lineTo(p[0],p[1]);
    }
  }

  // Close back to start
  var lastP=cp(arcEnd, bandR);
  ctx.lineTo(lastP[0],lastP[1]);
  ctx.closePath();

  // Gold gradient (radial: lighter outside, darker inside)
  var grdC=cp(-Math.PI/2, outerR);
  var grdO=cp(-Math.PI/2, outerR+ch);
  var bodyGrd=ctx.createLinearGradient(grdC[0],grdC[1],grdO[0],grdO[1]);
  bodyGrd.addColorStop(0,'#8B6914');
  bodyGrd.addColorStop(0.35,'#B8962E');
  bodyGrd.addColorStop(0.65,'#D4AF37');
  bodyGrd.addColorStop(1,'#E8C84A');
  ctx.fillStyle=bodyGrd;
  ctx.fill();
  ctx.strokeStyle='rgba(232,210,120,0.4)';
  ctx.lineWidth=max(0.4,sz*0.0007);
  ctx.stroke();
  ctx.restore();

  // в”Ђв”Ђ Oval tips в”Ђв”Ђ
  for(var i=0;i<nP;i++){
    var t=i/(nP-1);
    var a=arcStart+(arcEnd-arcStart)*t;
    var prongH=ch*ph[i]*0.72;
    var tipR2=bandOutR+prongH;
    var sc2=0.8+ph[i]*0.2;
    var orx=ovalR*sc2;
    var ory=ovalH*sc2;
    var tp=cp(a, tipR2+ory*0.2);

    ctx.save();
    ctx.translate(tp[0],tp[1]);
    ctx.rotate(a+Math.PI/2);
    ctx.beginPath();
    ctx.ellipse(0,0,orx,ory,0,0,Math.PI*2);
    var tg=ctx.createLinearGradient(0,-ory,0,ory);
    tg.addColorStop(0,'#EDD566');
    tg.addColorStop(0.4,'#D4AF37');
    tg.addColorStop(1,'#A07D1C');
    ctx.fillStyle=tg;
    ctx.fill();
    ctx.strokeStyle='rgba(180,150,50,0.3)';
    ctx.lineWidth=max(0.3,sz*0.0005);
    ctx.stroke();
    // Highlight
    ctx.beginPath();
    ctx.ellipse(-orx*0.2,-ory*0.2,orx*0.3,ory*0.25,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,245,200,'+(0.2*pulse)+')';
    ctx.fill();
    ctx.restore();
  }

  // в”Ђв”Ђ Diamond cutouts в”Ђв”Ђ
  for(var i=0;i<nP-1;i++){
    var t1=i/(nP-1),t2=(i+1)/(nP-1);
    var midA=arcStart+(arcEnd-arcStart)*(t1+t2)*0.5;
    var midR=bandOutR+ch*0.08;
    var mp=cp(midA, midR);
    var dw=sz*0.003;
    var dh=ch*0.12;
    // Diamond aligned radially
    var na=midA+Math.PI/2; // normal angle
    var dx2=Math.cos(na),dy2=Math.sin(na);
    var tx=Math.cos(midA),ty=Math.sin(midA);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(mp[0]+dx2*dh, mp[1]+dy2*dh);
    ctx.lineTo(mp[0]+tx*dw, mp[1]+ty*dw);
    ctx.moveTo(mp[0]+dx2*dh, mp[1]+dy2*dh);
    ctx.lineTo(mp[0]-tx*dw, mp[1]-ty*dw);
    // Full diamond
    ctx.beginPath();
    ctx.moveTo(mp[0]+dx2*dh, mp[1]+dy2*dh);   // outer
    ctx.lineTo(mp[0]+tx*dw, mp[1]+ty*dw);       // right
    ctx.lineTo(mp[0]-dx2*dh, mp[1]-dy2*dh);     // inner
    ctx.lineTo(mp[0]-tx*dw, mp[1]-ty*dw);       // left
    ctx.closePath();
    ctx.fillStyle='#5a4410';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(mp[0]+dx2*dh*0.55, mp[1]+dy2*dh*0.55);
    ctx.lineTo(mp[0]+tx*dw*0.5, mp[1]+ty*dw*0.5);
    ctx.lineTo(mp[0]-dx2*dh*0.55, mp[1]-dy2*dh*0.55);
    ctx.lineTo(mp[0]-tx*dw*0.5, mp[1]-ty*dw*0.5);
    ctx.closePath();
    ctx.fillStyle='rgba(212,175,55,0.2)';
    ctx.fill();
    ctx.restore();
  }

  // в”Ђв”Ђ Band highlight arc в”Ђв”Ђ
  ctx.save();
  ctx.beginPath();
  for(var i=0;i<=nSeg;i++){
    var a=arcStart+(arcEnd-arcStart)*(i/nSeg);
    var p=cp(a, bandOutR+0.5);
    if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);
  }
  ctx.strokeStyle='rgba(240,225,150,0.2)';
  ctx.lineWidth=max(0.4,sz*0.0006);
  ctx.stroke();
  ctx.restore();
}

// Block number + в‚ї on frame (mined) or just в‚ї logos (ghost)
function drawCurvedLabel(bn,cx,cy,rad,sz,ao){
  push();fill(0);noStroke();textAlign(CENTER,CENTER);textSize(sz*0.013);textStyle(BOLD);
  var seg=bn+'  \u20BF  ',ft=seg+seg+seg+seg,sp=TWO_PI/ft.length;
  for(var i=0;i<ft.length;i++){var a=-HALF_PI+ao+i*sp;
    push();translate(cx+cos(a)*rad,cy+sin(a)*rad);rotate(a+HALF_PI);text(ft[i],0,0);pop();}
  pop();
}
function drawCurvedLogos(cx,cy,rad,sz,ao){
  push();fill(0);noStroke();textAlign(CENTER,CENTER);textSize(sz*0.018);textStyle(BOLD);
  var n=6;
  for(var i=0;i<n;i++){var a=-HALF_PI+ao+(i/n)*TWO_PI;
    push();translate(cx+cos(a)*rad,cy+sin(a)*rad);rotate(a+HALF_PI);text('\u20BF',0,0);pop();}
  pop();
}

function drawStatus(sz,th,si,gh){
  push();var pad=height*0.06;var y=height-pad,gc=th.glow;
  for(var i=0;i<displaySets.length;i++){var x=width/2+(i-(displaySets.length-1)/2)*14;
    if(displaySets[i]===si){fill(gc[0],gc[1],gc[2]);}else{fill(60,60,60,120);}
    noStroke();ellipse(x,y,5,5);}
  // "ART UPDATE at [next block]"
  textAlign(CENTER,TOP);noStroke();textStyle(BOLD);
  fill(gc[0],gc[1],gc[2],200);textSize(sz*0.018);
  var nextEnd=null;
  for(var i=0;i<SETS.length;i++){if(!isMined(SETS[i].R)){nextEnd=SETS[i].R;break;}}
  if(nextEnd){text('ART UPDATE at '+nextEnd,width/2,y-18);}
  else{text('HUNTED ALL PREFIX',width/2,y-18);}
  fill(gc[0],gc[1],gc[2],120);textSize(sz*0.012);textStyle(NORMAL);
  var epoch=floor(H/2016);var epochPos=H%2016;
  text('epoch '+epoch+'  \u2022  '+epochPos+'/2016',width/2,y+8);
  pop();
}

// в•ђв•ђв•ђ MAIN в•ђв•ђв•ђ
function setup(){
  S=min(windowWidth,windowHeight);createCanvas(windowWidth,windowHeight);pixelDensity(2);frameRate(30);
  SB=createGraphics(windowWidth,windowHeight);SB.pixelDensity(2);
  updateDisplaySets();renderStatic();
}

// Pre-render static content (tx blocks for series 1 if mined)
function renderStatic(){
  var si=curSI();var set=SETS[si];var gh=curGhost();var th=curTheme();
  var rad2=S*0.21,gap2=S*0.10,cy2=height*0.5;
  var lx2=width*0.5-rad2-gap2*0.5,rx2=width*0.5+rad2+gap2*0.5;
  var thick2=S*0.022,clipR=rad2-thick2*0.55;
  clear();noStroke();
  fill(th.lens[0],th.lens[1],th.lens[2]);
  ellipse(lx2,cy2,clipR*2,clipR*2);ellipse(rx2,cy2,clipR*2,clipR*2);
  // Only pre-render tx data for series 0 when mined
  if(si===0&&!gh){
    push();drawingContext.save();drawingContext.beginPath();drawingContext.arc(lx2,cy2,clipR,0,TWO_PI);drawingContext.clip();
    drawTxBlock(lx2,cy2,clipR,TX[set.L],set.L);drawingContext.restore();pop();
    push();drawingContext.save();drawingContext.beginPath();drawingContext.arc(rx2,cy2,clipR,0,TWO_PI);drawingContext.clip();
    drawTxBlock(rx2,cy2,clipR,TX[set.R],set.R);drawingContext.restore();pop();
  }
  SB.clear();SB.image(get(),0,0);clear();
}

function draw(){
  var time=millis()/1000;
  var rad2=S*0.21,gap2=S*0.10,cy2=height*0.5;
  var lx2=width*0.5-rad2-gap2*0.5,rx2=width*0.5+rad2+gap2*0.5;
  var thick2=S*0.022,clipR=rad2-thick2*0.55;
  var rotAngle=(time-rotStart)*ROT_SPEED;

  setAge+=deltaTime/1000;
  if(setAge>=DUR&&rotAngle>=TWO_PI){
    DSI=(DSI+1)%displaySets.length;
    setAge=0;rotStart=time;rotAngle=0;
    renderStatic();
  }

  var si=curSI();var gh=curGhost();var set=SETS[si];var th=curTheme();
  background(th.bg);

  // Ghost: full-canvas matrix rain background (covers everything behind glasses)
  if(gh){
    var bgFs=max(7,floor(S*0.014));
    var bgCols=matrixCache['bg'];
    if(!bgCols){
      var bgRng=m32(42);bgCols=[];
      var bgN=ceil(max(width,S)/bgFs)+1;
      for(var i=0;i<bgN;i++){
        var nC=ceil(max(height,S)/bgFs)+10;
        var chars2=[];for(var j=0;j<nC;j++)chars2.push(bgRng()>0.5?'1':'0');
        bgCols.push({x:i*bgFs+bgFs*0.5,speed:0.15+bgRng()*0.5,offset:bgRng()*400,chars:chars2,bright:0.3+bgRng()*0.5});
      }
      matrixCache['bg']=bgCols;
    }
    var bgCtx=drawingContext;
    bgCtx.save();
    bgCtx.font=bgFs+'px monospace';bgCtx.textAlign='center';bgCtx.textBaseline='middle';
    var wc=GHOST.wire;
    var nRows=ceil(max(height,S)/bgFs)+4;
    var dropLen=12; // shorter drops = more heads visible
    for(var i=0;i<bgCols.length;i++){
      var col=bgCols[i];
      var scrollSpeed=bgFs*col.speed*0.5;
      var scroll=(time+col.offset)*scrollSpeed;
      var headIdx=floor(scroll/bgFs);
      for(var j=-2;j<nRows;j++){
        var charIdx=headIdx-j;
        var yPos=j*bgFs-(scroll%bgFs);
        if(yPos<-bgFs||yPos>S+bgFs)continue;
        var ch=col.chars[((charIdx%col.chars.length)+col.chars.length)%col.chars.length];
        var phase=(((headIdx-j)%dropLen)+dropLen)%dropLen;
        if(phase===0){
          bgCtx.shadowColor='rgba('+wc[0]+','+wc[1]+','+wc[2]+',0.5)';
          bgCtx.shadowBlur=bgFs*0.5;
          bgCtx.fillStyle='rgba(255,255,255,0.7)';
        }else if(phase<6){
          bgCtx.shadowBlur=0;
          bgCtx.fillStyle='rgba('+wc[0]+','+wc[1]+','+wc[2]+','+map(phase,0,6,0.4,0.08)+')';
        }else{
          bgCtx.shadowBlur=0;
          bgCtx.fillStyle='rgba('+floor(wc[0]*0.3)+','+floor(wc[1]*0.3)+','+floor(wc[2]*0.3)+','+0.15*col.bright+')';
        }
        bgCtx.fillText(ch,col.x,yPos);
      }
    }
    bgCtx.shadowBlur=0;
    bgCtx.restore();
  }

  var fadeIn=constrain(setAge/TFADE,0,1);
  var fadeOut=constrain((DUR-setAge)/TFADE,0,1);
  var lensAlpha=min(fadeIn,fadeOut);
  var bufAlpha=lensAlpha*255;
  if(gh){var away=max(1,set.L-H);var rate=map(constrain(away,0,6000000),0,6000000,3.0,0.4);bufAlpha*=map(sin(time*rate),-1,1,0.45,1.0);}

  // Static buffer (lens bg + tx data for series 0)
  tint(255,bufAlpha);image(SB,0,0);noTint();

  // Gears (series 1-6, drawn live for animation)
  if(si>0){
    for(var lens=0;lens<2;lens++){
      var lcx=lens===0?lx2:rx2;
      var bn=lens===0?set.L:set.R;
      push();drawingContext.save();drawingContext.beginPath();
      drawingContext.arc(lcx,cy2,clipR,0,TWO_PI);drawingContext.clip();
      drawMatrix(lcx,cy2,clipR,bn,time,gh,th);
      drawingContext.restore();pop();
    }
  }

  // Leaf + scan
  var breathe=1+sin(time*1.5)*0.05;
  var glowA=map(sin(time*1.5),-1,1,60,180)*lensAlpha;
  var leafSz=rad2*2.2,L=leafSz*0.48,leafY=cy2+L*0.375;
  for(var lens=0;lens<2;lens++){
    var lcx=lens===0?lx2:rx2;
    push();drawingContext.save();drawingContext.beginPath();
    drawingContext.arc(lcx,cy2,clipR,0,TWO_PI);drawingContext.clip();
    drawLeaf(lcx,leafY,leafSz*breathe,glowA,THEMES[0]);
    var scanT=(time%4.0)/4.0,scanY=cy2-clipR+scanT*clipR*2;noStroke();
    var sc=th.glowC;for(var j=-3;j<=3;j++){var sa=map(abs(j),0,3,25,0)*lensAlpha;fill(sc[0],sc[1],sc[2],sa);rect(lcx-clipR,scanY+j*2,clipR*2,2);}
    drawingContext.restore();pop();
  }

  // Fire: mined fire themes always; ghost only during the difficulty epoch containing next series block
  if(th.fire&&!gh){
    drawFireEffect(lx2,cy2,rx2,cy2,rad2,thick2,time,th.fireC);
  }else if(gh){
    // Flames appear only when H is in the same 2016-block epoch as the target block
    var targetEpoch=floor(set.L/2016);
    var currentEpoch=floor(H/2016);
    if(currentEpoch===targetEpoch){
      var epochPos=(H%2016)/2016;
      var ghostFire=[th.glow[0],th.glow[1],th.glow[2]];
      push();drawingContext.globalAlpha=0.2+epochPos*0.8;
      drawFireEffect(lx2,cy2,rx2,cy2,rad2,thick2,time,ghostFire);
      drawingContext.globalAlpha=1.0;pop();
    }
  }

  drawGlowFrame(lx2,cy2,rx2,cy2,rad2,thick2,time,th);
  drawFrame(lx2,cy2,rx2,cy2,rad2,thick2,th);
  drawBridgeText(lx2,rx2,cy2,rad2,S);

  // Crowns on series 7 frame вЂ” only when mined (gold flame earned)
  if(si===6&&!gh){
    drawCrown(lx2,rx2,cy2,rad2,S,time,th,thick2);
    drawLensCrown(lx2,cy2,rad2,S,time,th);
    drawLensCrown(rx2,cy2,rad2,S,time,th);
  }

  // Mined: block numbers on frame | Ghost: в‚ї logos only
  if(gh){
    drawCurvedLogos(lx2,cy2,rad2,S,rotAngle);
    drawCurvedLogos(rx2,cy2,rad2,S,rotAngle);
  }else{
    drawCurvedLabel(''+set.L,lx2,cy2,rad2,S,rotAngle);
    drawCurvedLabel(''+set.R,rx2,cy2,rad2,S,rotAngle);
  }
  drawStatus(S,th,si,gh);

}

function windowResized(){S=min(windowWidth,windowHeight);resizeCanvas(windowWidth,windowHeight);SB=createGraphics(windowWidth,windowHeight);SB.pixelDensity(2);matrixCache={};renderStatic();}

setTimeout(function(){if(typeof p5!=='undefined'&&!document.querySelector('canvas')){new p5();}},100);
</script>
